<h1>{{ title }}</h1>
<button [disabled]="isDisabled()" (click)="onClick()">Dont click-me</button>
<button (click)="onClick()">Alternar estado do botão do lado</button>
<br><br>

<h3>Quantidade de clicks = {{ clickCounter() }}</h3>
<button style="margin: 0 1rem;" (click)="increateCounter()">+</button>
<button (click)="decreaseCounter()">-</button>
<br><br>
<button style="margin: 0 1.2rem;" (click)="resetCounter()">Reset</button>
