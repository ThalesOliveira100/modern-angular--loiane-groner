<mat-card class="product-card">
  <mat-card-header>
    <mat-card-title>{{ product().nome }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    @if (product().precoOriginal) {
      <span class="sale-bagde">PROMOÇÃO</span>

      <p class="price-row">
        <span class="current-price">R$ {{ product().preco }}</span>
        <span class="original-price">R$ {{ product().precoOriginal }}</span>
      </p>
    } @else {
      <p class="price-row">
        <span class="current-price">R$ {{ product().preco }}</span>
      </p>
    }

    <p>{{ product().descricao }}</p>
  </mat-card-content>

  <mat-card-actions>
    <button matButton (click)="onAddToCard()">{{ addButtonLabel() }}</button>
  </mat-card-actions>
</mat-card>
