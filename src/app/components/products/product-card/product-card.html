<mat-card class="product-card">
  <mat-card-header>
    <mat-card-title>{{ product().nome }}</mat-card-title>
    <mat-card-subtitle>Categoria</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <p>{{ product().descricao }}</p>
    <p class="price">{{ product().preco }}</p>
  </mat-card-content>

  <mat-card-actions>
    <button matButton>{{ addButtonLabel() }}</button>
  </mat-card-actions>
</mat-card>
